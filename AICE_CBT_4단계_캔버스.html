<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AICE 대비 AI 기초·데이터 이해·생성형 AI 학습용 CBT" />
  <title>AICE 대비 AI 학습 CBT</title>
  <style>
    :root {
      --ink: #172033;
      --muted: #68748b;
      --navy: #173267;
      --blue: #345fe3;
      --blue-dark: #2448bd;
      --blue-soft: #edf3ff;
      --mint: #dff7ee;
      --green: #16805f;
      --red: #c83a55;
      --red-soft: #fff0f3;
      --amber: #a45d0b;
      --line: #dfe5ee;
      --surface: #ffffff;
      --surface-soft: #f7f9fc;
      --shadow: 0 18px 48px rgb(26 48 93 / .09);
      --radius-lg: 28px;
      --radius-md: 18px;
      font-family: Pretendard, "Noto Sans KR", "Apple SD Gothic Neo", system-ui, sans-serif;
      color: var(--ink);
      background: var(--surface-soft);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { min-width: 320px; margin: 0; background: var(--surface-soft); line-height: 1.6; }
    button, input, textarea { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .48; }
    :focus-visible { outline: 3px solid #8bb3ff; outline-offset: 3px; }
    [hidden] { display: none !important; }

    .skip-link { position: fixed; top: 10px; left: 10px; z-index: 100; padding: 10px 14px; border-radius: 8px; background: var(--navy); color: #fff; transform: translateY(-150%); }
    .skip-link:focus { transform: translateY(0); }
    .site-header { position: sticky; top: 0; z-index: 20; min-height: 78px; padding: 0 max(4vw, 24px); display: flex; align-items: center; justify-content: space-between; gap: 30px; border-bottom: 1px solid rgb(223 229 238 / .86); background: rgb(255 255 255 / .94); backdrop-filter: blur(16px); }
    .brand { display: inline-flex; align-items: center; gap: 11px; border: 0; background: transparent; color: var(--navy); text-align: left; }
    .brand-mark { width: 38px; height: 38px; display: grid; place-items: center; border-radius: 12px; background: linear-gradient(145deg, var(--blue), #6f8df0); color: #fff; font-size: 1.08rem; font-weight: 900; box-shadow: 0 7px 18px rgb(52 95 227 / .24); }
    .brand-label { display: grid; line-height: 1.15; }
    .brand-label strong { font-size: 1.02rem; letter-spacing: .04em; }
    .brand-label small { margin-top: 3px; color: var(--muted); font-size: .71rem; font-weight: 700; }
    .site-nav { display: flex; align-items: center; gap: 4px; }
    .nav-button { position: relative; padding: 10px 13px; border: 0; border-radius: 10px; background: transparent; color: #59657a; font-size: .92rem; font-weight: 750; }
    .nav-button:hover, .nav-button.active { background: var(--blue-soft); color: var(--blue-dark); }
    .nav-badge { min-width: 20px; height: 20px; margin-left: 3px; padding: 0 6px; display: inline-grid; place-items: center; border-radius: 999px; background: #dce7ff; color: var(--blue-dark); font-size: .72rem; }
    .menu-toggle { display: none; width: 42px; height: 42px; border: 1px solid var(--line); border-radius: 11px; background: #fff; color: var(--navy); font-weight: 900; }

    .page-shell { width: min(1120px, calc(100% - 48px)); min-height: calc(100vh - 190px); margin: 42px auto 76px; }
    .view { animation: appear .24s ease both; }
    @keyframes appear { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: none; } }
    .eyebrow { margin: 0 0 7px; color: var(--blue); font-size: .78rem; font-weight: 850; letter-spacing: .13em; text-transform: uppercase; }
    h1, h2, h3, p { overflow-wrap: anywhere; }
    h1 { margin: 0; font-size: clamp(2rem, 4vw, 3.55rem); line-height: 1.2; letter-spacing: -.045em; }
    h2 { line-height: 1.3; letter-spacing: -.025em; }
    .lead { max-width: 650px; margin: 20px 0 0; color: var(--muted); font-size: 1.06rem; }
    .button-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 30px; }
    .button { min-height: 45px; padding: 11px 18px; display: inline-flex; align-items: center; justify-content: center; gap: 7px; border: 1px solid transparent; border-radius: 12px; font-weight: 800; line-height: 1.3; transition: transform 150ms ease, background 150ms ease; }
    .button:hover:not(:disabled) { transform: translateY(-1px); }
    .button.primary { background: var(--blue); color: #fff; box-shadow: 0 10px 24px rgb(52 95 227 / .22); }
    .button.primary:hover:not(:disabled) { background: var(--blue-dark); }
    .button.secondary { border-color: #ccd7e8; background: #fff; color: var(--navy); }
    .button.ghost { border-color: var(--line); background: transparent; color: var(--muted); }
    .button.danger { border-color: #f0b7c2; background: var(--red-soft); color: var(--red); }
    .button.small { min-height: 38px; padding: 8px 12px; font-size: .84rem; }

    .hero { position: relative; min-height: 455px; padding: clamp(34px, 6vw, 68px); display: grid; grid-template-columns: minmax(0, 1.45fr) minmax(270px, .72fr); align-items: center; gap: 54px; overflow: hidden; border: 1px solid #dae4f6; border-radius: 34px; background: radial-gradient(circle at 91% 8%, #d6e2ff 0, transparent 31%), linear-gradient(135deg, #fff 2%, #f0f5ff 58%, #e8f9f4 110%); box-shadow: var(--shadow); }
    .hero::after { content: ""; position: absolute; right: -45px; bottom: -80px; width: 250px; height: 250px; border: 42px solid rgb(52 95 227 / .07); border-radius: 50%; }
    .hero-copy, .hero-panel { position: relative; z-index: 1; }
    .hero-panel { padding: 26px; border: 1px solid rgb(255 255 255 / .88); border-radius: 24px; background: rgb(255 255 255 / .76); box-shadow: 0 22px 45px rgb(27 50 95 / .12); backdrop-filter: blur(8px); }
    .panel-label { display: inline-block; margin-bottom: 17px; color: var(--muted); font-size: .78rem; font-weight: 800; }
    .flow-list { margin: 0; padding: 0; display: grid; gap: 12px; list-style: none; }
    .flow-list li { padding: 12px 0; display: flex; align-items: center; gap: 13px; border-bottom: 1px solid var(--line); }
    .flow-list li:last-child { border: 0; }
    .flow-list li > span { width: 36px; height: 36px; display: grid; place-items: center; border-radius: 11px; background: var(--blue-soft); color: var(--blue); font-size: .75rem; font-weight: 900; }
    .flow-list div { display: grid; }
    .flow-list strong { font-size: .94rem; }
    .flow-list small { color: var(--muted); font-size: .8rem; }

    .dashboard-section { margin-top: 52px; }
    .section-heading { margin-bottom: 24px; display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; }
    .section-heading h2 { margin: 0; font-size: clamp(1.5rem, 2.4vw, 2rem); }
    .section-note, .page-heading p { margin: 0; color: var(--muted); }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .stat-card { min-height: 145px; padding: 23px; border: 1px solid var(--line); border-radius: var(--radius-md); background: var(--surface); }
    .stat-card span { color: var(--muted); font-size: .82rem; font-weight: 750; }
    .stat-card strong { margin-top: 15px; display: block; color: var(--navy); font-size: 1.9rem; line-height: 1; letter-spacing: -.04em; }
    .stat-card small { margin-top: 10px; display: block; color: var(--muted); }
    .action-grid { margin-top: 52px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 17px; }
    .action-card { position: relative; min-height: 262px; padding: 28px; overflow: hidden; border: 1px solid var(--line); border-radius: 24px; background: #fff; }
    .action-card-blue { background: #eef3ff; border-color: #d8e2ff; }
    .action-card-navy { background: var(--navy); border-color: var(--navy); color: #fff; }
    .action-card-mint { background: var(--mint); border-color: #cbe9df; }
    .card-number { position: absolute; top: 16px; right: 21px; color: rgb(41 61 96 / .12); font-size: 4rem; font-weight: 900; line-height: 1; }
    .action-card-navy .card-number { color: rgb(255 255 255 / .11); }
    .card-kicker { margin: 0 0 37px; color: var(--blue); font-size: .73rem; font-weight: 900; letter-spacing: .14em; }
    .action-card-navy .card-kicker { color: #9fb8ff; }
    .action-card h2 { margin: 0; font-size: 1.28rem; }
    .action-card > p:not(.card-kicker) { margin: 11px 0 24px; color: var(--muted); font-size: .92rem; }
    .action-card-navy > p:not(.card-kicker) { color: #cbd7ef; }
    .text-link { padding: 0; border: 0; background: transparent; color: inherit; font-weight: 850; }
    .text-link:hover { text-decoration: underline; text-underline-offset: 4px; }

    .page-heading { margin: 12px 0 30px; display: flex; align-items: flex-end; justify-content: space-between; gap: 22px; }
    .page-heading h1 { font-size: clamp(2rem, 3.7vw, 3rem); }
    .page-heading p:not(.eyebrow) { margin-top: 8px; }
    .topic-filters { margin-bottom: 18px; display: flex; flex-wrap: wrap; gap: 8px; }
    .topic-filter { padding: 8px 13px; border: 1px solid var(--line); border-radius: 999px; background: #fff; color: var(--muted); font-size: .86rem; font-weight: 800; }
    .topic-filter.active { border-color: #9ab3fb; background: var(--blue-soft); color: var(--blue-dark); }

    .question-card, .start-card, .empty-state { max-width: 790px; margin: 0 auto; padding: clamp(24px, 4vw, 38px); border: 1px solid var(--line); border-radius: var(--radius-lg); background: #fff; box-shadow: var(--shadow); }
    .start-card, .empty-state { padding: clamp(28px, 5vw, 48px); text-align: center; }
    .question-topline { display: flex; align-items: center; justify-content: space-between; gap: 15px; }
    .meta-group { display: flex; flex-wrap: wrap; gap: 7px; }
    .tag { display: inline-flex; min-height: 25px; padding: 3px 9px; border-radius: 999px; background: var(--blue-soft); color: var(--blue-dark); font-size: .73rem; font-weight: 850; }
    .tag.neutral { background: #eef1f5; color: #5d6778; }
    .progress-text { color: var(--muted); font-size: .84rem; font-weight: 750; }
    .question-label { margin: 24px 0 10px; font-size: 1rem; color: var(--blue); }
    .question-stem { margin: 0 0 26px; font-size: clamp(1.08rem, 2vw, 1.25rem); font-weight: 750; line-height: 1.62; }
    .choice-list { margin: 0; padding: 0; display: grid; gap: 10px; border: 0; }
    .choice { padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; border: 1px solid var(--line); border-radius: 14px; background: #fff; cursor: pointer; }
    .choice:hover { border-color: #a9bcea; background: #f8faff; }
    .choice.selected { border-color: var(--blue); background: var(--blue-soft); box-shadow: inset 0 0 0 1px var(--blue); }
    .choice.correct { border-color: #77c3a8; background: #edf9f5; }
    .choice.wrong { border-color: #eea5b3; background: var(--red-soft); }
    .choice input { width: 18px; height: 18px; margin: 3px 0 0; accent-color: var(--blue); }
    .choice-index { flex: 0 0 25px; height: 25px; display: grid; place-items: center; border-radius: 8px; background: #eef1f5; color: #556174; font-size: .76rem; font-weight: 850; }
    .choice.selected .choice-index { background: var(--blue); color: #fff; }
    .question-actions { margin-top: 26px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .feedback { margin-top: 22px; padding: 19px; border-radius: 15px; }
    .feedback.correct { border: 1px solid #b8e2d3; background: #eefaf6; color: #175f49; }
    .feedback.incorrect { border: 1px solid #f1bdc7; background: var(--red-soft); color: #8f2f43; }
    .feedback h3, .feedback p { margin: 0; }
    .feedback p { margin-top: 5px; color: var(--ink); }

    .start-card h2, .empty-state h2 { margin: 0; font-size: 1.65rem; }
    .start-card > p, .empty-state p { color: var(--muted); }
    .start-details { max-width: 570px; margin: 25px auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: left; }
    .start-details div { padding: 15px; border-radius: 14px; background: var(--surface-soft); }
    .start-details strong, .start-details small { display: block; }
    .start-details small { margin-top: 3px; color: var(--muted); }
    .exam-status { position: sticky; top: 94px; z-index: 10; margin-bottom: 16px; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 18px; border: 1px solid #d7e1f5; border-radius: 15px; background: rgb(255 255 255 / .96); box-shadow: 0 8px 24px rgb(25 46 88 / .08); }
    .exam-status-group { display: flex; flex-wrap: wrap; align-items: center; gap: 18px; }
    .timer { color: var(--red); font-size: 1.08rem; font-weight: 900; font-variant-numeric: tabular-nums; }
    .exam-layout { display: grid; grid-template-columns: minmax(0, 1fr) 220px; align-items: start; gap: 16px; }
    .exam-layout .question-card { max-width: none; width: 100%; }
    .question-map { position: sticky; top: 174px; padding: 18px; border: 1px solid var(--line); border-radius: var(--radius-md); background: #fff; }
    .question-map h2 { margin: 0 0 13px; font-size: .94rem; }
    .number-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; }
    .number-button { aspect-ratio: 1; border: 1px solid var(--line); border-radius: 9px; background: #fff; color: var(--muted); font-size: .8rem; font-weight: 850; }
    .number-button.answered { border-color: #b5c7fb; background: var(--blue-soft); color: var(--blue-dark); }
    .number-button.current { border-color: var(--blue); background: var(--blue); color: #fff; }

    .score-card { padding: clamp(28px, 5vw, 46px); display: grid; grid-template-columns: auto 1fr; align-items: center; gap: 34px; border: 1px solid #d7e2f6; border-radius: var(--radius-lg); background: linear-gradient(135deg, #fff, #edf3ff); box-shadow: var(--shadow); }
    .score-ring { width: 154px; height: 154px; display: grid; place-items: center; border: 13px solid #dce6fb; border-top-color: var(--blue); border-radius: 50%; background: #fff; text-align: center; }
    .score-ring strong { display: block; color: var(--navy); font-size: 2.2rem; line-height: 1; }
    .score-ring small { color: var(--muted); }
    .score-copy h2 { margin: 0; font-size: 1.8rem; }
    .score-copy p { margin: 8px 0 0; color: var(--muted); }
    .mini-stats { margin-top: 20px; display: flex; flex-wrap: wrap; gap: 8px; }
    .mini-stat { padding: 8px 12px; border-radius: 10px; background: rgb(255 255 255 / .82); color: var(--muted); font-size: .85rem; }
    .result-list, .wrong-list { margin-top: 25px; display: grid; gap: 13px; }
    .result-item, .wrong-card { padding: 24px; border: 1px solid var(--line); border-radius: var(--radius-md); background: #fff; }
    .result-item-head, .wrong-card-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .status-label { font-size: .8rem; font-weight: 900; }
    .status-label.correct { color: var(--green); }
    .status-label.incorrect { color: var(--red); }
    .result-item h3, .wrong-card h2 { margin: 14px 0 10px; font-size: 1.02rem; }
    .answer-lines { padding: 14px; border-radius: 12px; background: var(--surface-soft); }
    .answer-lines p { margin: 3px 0; }
    .explanation-box { margin-top: 12px; padding: 15px; border-left: 4px solid #9ab3fb; border-radius: 0 12px 12px 0; background: var(--blue-soft); }
    .explanation-box p { margin: 0; }
    .review-toolbar { margin-bottom: 18px; display: flex; align-items: center; justify-content: space-between; gap: 18px; }
    .review-toolbar > p { margin: 0; color: var(--muted); font-size: .88rem; }
    .wrong-card.completed { background: #f8fafb; opacity: .78; }
    .memo-label { margin-top: 18px; display: block; color: var(--muted); font-size: .82rem; font-weight: 800; }
    .memo { width: 100%; min-height: 88px; margin-top: 7px; padding: 12px; resize: vertical; border: 1px solid var(--line); border-radius: 12px; background: #fff; }
    .wrong-actions { margin-top: 13px; display: flex; flex-wrap: wrap; gap: 8px; }
    .empty-icon { width: 64px; height: 64px; margin: 0 auto 18px; display: grid; place-items: center; border-radius: 22px; background: var(--mint); color: var(--green); font-size: 1.4rem; font-weight: 900; }
    .toast { position: fixed; right: 24px; bottom: 24px; z-index: 60; max-width: 360px; padding: 13px 17px; border-radius: 12px; background: var(--navy); color: #fff; box-shadow: 0 16px 42px rgb(10 27 58 / .24); font-size: .9rem; font-weight: 750; animation: toast .2s ease both; }
    @keyframes toast { from { opacity: 0; transform: translateY(10px); } }
    .site-footer { padding: 26px 24px 35px; border-top: 1px solid var(--line); color: var(--muted); text-align: center; font-size: .78rem; }
    .site-footer p { margin: 4px; }

    @media (max-width: 820px) {
      .menu-toggle { display: grid; place-items: center; }
      .site-header { flex-wrap: wrap; padding-block: 14px; }
      .site-nav { width: 100%; display: none; padding-top: 6px; overflow-x: auto; }
      .site-nav.open { display: flex; }
      .nav-button { white-space: nowrap; }
      .hero { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .action-grid { grid-template-columns: 1fr; }
      .exam-layout { grid-template-columns: 1fr; }
      .question-map { position: static; }
    }
    @media (max-width: 560px) {
      .page-shell { width: min(100% - 28px, 1120px); margin-top: 26px; }
      .hero { padding: 30px 23px; border-radius: 25px; }
      .hero-panel { padding: 20px; }
      .stats-grid, .start-details { grid-template-columns: 1fr; }
      .section-heading, .page-heading, .score-card { display: block; }
      .section-note { margin-top: 8px; }
      .score-ring { margin: 0 auto 24px; }
      .question-actions { align-items: stretch; flex-direction: column; }
      .question-actions .button { width: 100%; }
      .exam-status { position: static; align-items: stretch; flex-direction: column; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">본문으로 건너뛰기</a>
  <header class="site-header">
    <button class="brand" type="button" data-route="home" aria-label="AICE 학습 CBT 홈">
      <span class="brand-mark" aria-hidden="true">A</span>
      <span class="brand-label"><strong>AICE</strong><small>AI 학습 CBT</small></span>
    </button>
    <button class="menu-toggle" type="button" aria-expanded="false" aria-label="메뉴 열기">☰</button>
    <nav class="site-nav" aria-label="주요 메뉴">
      <button class="nav-button active" type="button" data-route="home">홈</button>
      <button class="nav-button" type="button" data-route="learn">주제별 학습</button>
      <button class="nav-button" type="button" data-route="mock">모의고사</button>
      <button class="nav-button" type="button" data-route="wrong">오답노트 <span class="nav-badge" data-wrong-count>0</span></button>
    </nav>
  </header>

  <main id="main" class="page-shell" tabindex="-1">
    <section class="view" data-view="home"></section>
    <section class="view" data-view="learn" hidden></section>
    <section class="view" data-view="mock" hidden></section>
    <section class="view" data-view="result" hidden></section>
    <section class="view" data-view="wrong" hidden></section>
  </main>

  <footer class="site-footer">
    <p>기록은 이 브라우저에만 저장되며, 브라우저 데이터 삭제 또는 기기 변경 시 사라질 수 있습니다.</p>
    <p>실제 기출문제가 아닌 직접 제작한 학습 예시를 사용합니다.</p>
  </footer>
  <div class="toast" role="status" aria-live="polite" hidden></div>

  <script>
    (() => {
      "use strict";
      const questions = [
        { id: "BAS-001", topic: "AI 기초", difficulty: "쉬움", stem: "다음 중 지도학습(supervised learning)에 가장 알맞은 설명은 무엇인가?", choices: ["정답이 없는 데이터에서 숨은 구조를 찾는다.", "입력 데이터와 정답(label)을 함께 사용해 예측 규칙을 학습한다.", "보상을 최대화하도록 행동을 반복한다.", "사람의 개입 없이 항상 완벽한 답을 만든다."], answer: 1, explanation: "지도학습은 입력값과 정답(label)의 관계를 학습해 새 입력의 정답을 예측하는 방법입니다." },
        { id: "BAS-002", topic: "데이터 이해", difficulty: "쉬움", stem: "학습 데이터에 빈 값이 많은 열을 발견했을 때, 가장 먼저 할 일로 적절한 것은 무엇인가?", choices: ["바로 해당 열을 삭제한다.", "결측치의 양과 발생 이유, 업무상 의미를 먼저 확인한다.", "빈 값을 모두 0으로 바꾼다.", "데이터를 확인하지 않고 모델부터 학습한다."], answer: 1, explanation: "결측치는 무조건 삭제하거나 치환하지 않습니다. 비율과 원인을 살핀 뒤 목적에 맞는 처리 방법을 정해야 합니다." },
        { id: "BAS-003", topic: "AI 윤리", difficulty: "보통", stem: "채용 지원자 데이터를 활용하는 AI 서비스에서 공정성 위험을 줄이는 방법으로 가장 적절한 것은 무엇인가?", choices: ["성별·연령별 결과 차이를 점검하고 편향을 검토한다.", "정확도만 높으면 공정성 검토는 생략한다.", "서비스의 판단 근거를 어떤 경우에도 공개하지 않는다.", "개인정보 동의 없이 데이터를 최대한 많이 수집한다."], answer: 0, explanation: "AI 성능뿐 아니라 집단별 불이익 여부, 개인정보 보호, 설명 가능성을 함께 검토해야 합니다." },
        { id: "BAS-004", topic: "생성형 AI", difficulty: "보통", stem: "생성형 AI에게 업무용 요약을 요청할 때 결과의 신뢰성을 높이는 방법은 무엇인가?", choices: ["출처 확인 없이 첫 결과를 바로 사용한다.", "목적·대상·분량·형식을 구체적으로 제시하고 사실을 검증한다.", "민감한 개인정보를 제한 없이 모두 입력한다.", "모호할수록 창의적이므로 조건을 쓰지 않는다."], answer: 1, explanation: "명확한 조건을 제시하고, 중요한 사실은 원문이나 공식 출처로 다시 확인해야 합니다." },
        { id: "BAS-005", topic: "모델 평가", difficulty: "보통", stem: "분류 모델의 성능을 평가하기 위해 학습에 사용하지 않은 데이터를 따로 두는 주된 이유는 무엇인가?", choices: ["데이터 양을 줄이기 위해서", "새로운 데이터에도 작동하는지 확인하기 위해서", "모델을 더 복잡하게 만들기 위해서", "정답을 숨기기 위해서"], answer: 1, explanation: "검증·테스트 데이터는 모델이 보지 못한 데이터에서도 잘 작동하는지, 즉 일반화 성능을 확인하는 데 사용합니다." }
      ];

      const KEY = "aice-cbt-canvas-state-v1";
      const initialState = () => ({ learnAttempts: [], mockAttempts: [], wrongNotes: {} });
      let state = loadState();
      let learn = { filter: "전체", index: 0, selected: null, submitted: false };
      let exam = null;
      let timerId = null;
      let lastResult = null;

      function loadState() {
        try {
          const parsed = JSON.parse(localStorage.getItem(KEY));
          if (!parsed || typeof parsed !== "object") return initialState();
          return { learnAttempts: Array.isArray(parsed.learnAttempts) ? parsed.learnAttempts : [], mockAttempts: Array.isArray(parsed.mockAttempts) ? parsed.mockAttempts : [], wrongNotes: parsed.wrongNotes && typeof parsed.wrongNotes === "object" ? parsed.wrongNotes : {} };
        } catch { return initialState(); }
      }
      function saveState() { localStorage.setItem(KEY, JSON.stringify(state)); updateBadges(); }
      function esc(value) { return String(value).replace(/[&<>'"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;" })[c]); }
      function today(timestamp) { const a = new Date(timestamp), b = new Date(); return a.toDateString() === b.toDateString(); }
      function formatDate(ts) { return new Intl.DateTimeFormat("ko-KR", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" }).format(new Date(ts)); }
      function pendingWrong() { return Object.values(state.wrongNotes).filter(note => !note.completed).length; }
      function showToast(message) { const toast = document.querySelector(".toast"); toast.textContent = message; toast.hidden = false; clearTimeout(showToast.timer); showToast.timer = setTimeout(() => { toast.hidden = true; }, 2200); }
      function updateBadges() { document.querySelectorAll("[data-wrong-count]").forEach(el => el.textContent = pendingWrong()); }
      function setHTML(route, html) { document.querySelector(`[data-view="${route}"]`).innerHTML = html; }

      function navigate(route) {
        document.querySelectorAll("[data-view]").forEach(view => { view.hidden = view.dataset.view !== route; });
        document.querySelectorAll(".nav-button").forEach(btn => btn.classList.toggle("active", btn.dataset.route === route || (route === "result" && btn.dataset.route === "mock")));
        document.querySelector(".site-nav").classList.remove("open");
        document.querySelector(".menu-toggle").setAttribute("aria-expanded", "false");
        if (route === "home") renderHome();
        if (route === "learn") renderLearn();
        if (route === "mock") renderMock();
        if (route === "result") renderResult();
        if (route === "wrong") renderWrong();
        window.scrollTo({ top: 0, behavior: "smooth" });
        document.querySelector("#main").focus({ preventScroll: true });
      }

      function statCard(label, value, note) { return `<article class="stat-card"><span>${esc(label)}</span><strong>${esc(value)}</strong><small>${esc(note)}</small></article>`; }
      function renderHome() {
        const learnedToday = state.learnAttempts.filter(a => today(a.createdAt)).length;
        const recent = state.mockAttempts.at(-1);
        const timestamps = [...state.learnAttempts, ...state.mockAttempts].map(a => a.createdAt).filter(Number.isFinite);
        setHTML("home", `
          <section class="hero" aria-labelledby="hero-title">
            <div class="hero-copy"><p class="eyebrow">AICE 대비 · 직접 만든 학습용 문제</p><h1 id="hero-title">한 문제씩 이해하고,<br>틀린 이유까지 남겨보세요.</h1><p class="lead">AI 기초부터 생성형 AI까지 주제별로 학습하고, 모의고사와 오답 복습으로 부족한 개념을 확인할 수 있어요.</p><div class="button-row"><button class="button primary" data-route="learn">오늘의 학습 시작</button><button class="button secondary" data-route="mock">모의고사 풀기</button></div></div>
            <aside class="hero-panel" aria-label="학습 흐름"><span class="panel-label">학습 흐름</span><ol class="flow-list"><li><span>01</span><div><strong>문제 풀이</strong><small>주제별로 한 문제씩</small></div></li><li><span>02</span><div><strong>채점·해설</strong><small>답을 확인하고 이해하기</small></div></li><li><span>03</span><div><strong>오답 복습</strong><small>메모하고 다시 풀기</small></div></li></ol></aside>
          </section>
          <section class="dashboard-section"><div class="section-heading"><div><p class="eyebrow">나의 학습 현황</p><h2>오늘도 차근차근 이어가요.</h2></div><p class="section-note">${timestamps.length ? `최근 학습 ${formatDate(Math.max(...timestamps))}` : "아직 저장된 학습 기록이 없어요."}</p></div><div class="stats-grid">${statCard("오늘 학습", `${learnedToday}문제`, learnedToday ? "오늘 제출한 주제별 문제" : "오늘 첫 문제를 풀어보세요")}${statCard("최근 모의고사", recent ? `${recent.correct}/${questions.length}` : "-", recent ? `${recent.score}점 · ${formatDate(recent.createdAt)}` : "아직 기록이 없어요")}${statCard("복습할 오답", `${pendingWrong()}문제`, pendingWrong() ? "완료 전인 오답 문제" : "밀린 오답이 없어요")}${statCard("등록 문제", `${questions.length}문제`, "검수 완료된 직접 제작 예시")}</div></section>
          <section class="action-grid" aria-label="학습 메뉴"><article class="action-card action-card-blue"><span class="card-number">01</span><p class="card-kicker">LEARN</p><h2>주제별 문제 풀이</h2><p>답안을 제출하면 바로 정답과 해설을 확인해요.</p><button class="text-link" data-route="learn">학습 시작 →</button></article><article class="action-card action-card-navy"><span class="card-number">02</span><p class="card-kicker">MOCK EXAM</p><h2>10분 모의고사</h2><p>정답을 미리 보지 않고 연속으로 문제를 풀어요.</p><button class="text-link" data-route="mock">시험 시작 →</button></article><article class="action-card action-card-mint"><span class="card-number">03</span><p class="card-kicker">REVIEW</p><h2>나의 오답노트</h2><p>틀린 문제에 메모를 남기고 다시 풀어봐요.</p><button class="text-link" data-route="wrong">오답 복습 →</button></article></section>`);
      }

      function choiceMarkup(question, selected, submitted, name) {
        return question.choices.map((choice, i) => {
          const classes = ["choice", selected === i ? "selected" : "", submitted && question.answer === i ? "correct" : "", submitted && selected === i && selected !== question.answer ? "wrong" : ""].filter(Boolean).join(" ");
          return `<label class="${classes}"><input type="radio" name="${name}" value="${i}" ${selected === i ? "checked" : ""} ${submitted ? "disabled" : ""}><span class="choice-index">${i + 1}</span><span>${esc(choice)}</span></label>`;
        }).join("");
      }
      function questionCard(question, selected, submitted, current, total, mode) {
        const correct = submitted && selected === question.answer;
        return `<article class="question-card"><div class="question-topline"><div class="meta-group"><span class="tag">${esc(question.topic)}</span><span class="tag neutral">${esc(question.difficulty)}</span></div><span class="progress-text">${current} / ${total}</span></div><h2 class="question-label">QUESTION ${current}</h2><p class="question-stem">${esc(question.stem)}</p><fieldset class="choice-list" aria-label="선택지">${choiceMarkup(question, selected, submitted, `${mode}-${question.id}`)}</fieldset>${submitted ? `<div class="feedback ${correct ? "correct" : "incorrect"}"><h3>${correct ? "정답이에요!" : `아쉬워요. 정답은 ${question.answer + 1}번이에요.`}</h3><p>${esc(question.explanation)}</p></div>` : ""}<div class="question-actions"><button class="button ghost" data-action="prev" ${current === 1 ? "disabled" : ""}>이전 문제</button><button class="button primary" data-action="${submitted ? "next" : "submit"}" ${selected === null ? "disabled" : ""}>${submitted ? (current === total ? "학습 완료" : "다음 문제") : "정답 확인"}</button></div></article>`;
      }
      function filteredQuestions() { return learn.filter === "전체" ? questions : questions.filter(q => q.topic === learn.filter); }
      function renderLearn() {
        const list = filteredQuestions();
        if (learn.index >= list.length) learn.index = 0;
        const q = list[learn.index];
        const topics = ["전체", ...new Set(questions.map(q => q.topic))];
        setHTML("learn", `<div class="page-heading"><div><p class="eyebrow">LEARN</p><h1>주제별 학습</h1><p>답을 고르면 즉시 채점하고 핵심 개념을 확인해요.</p></div></div><div class="topic-filters" aria-label="주제 선택">${topics.map(t => `<button class="topic-filter ${learn.filter === t ? "active" : ""}" data-topic="${esc(t)}">${esc(t)}</button>`).join("")}</div>${questionCard(q, learn.selected, learn.submitted, learn.index + 1, list.length, "learn")}`);
      }
      function saveWrong(question, source) {
        const prev = state.wrongNotes[question.id] || {};
        state.wrongNotes[question.id] = { memo: prev.memo || "", completed: false, sources: [...new Set([...(prev.sources || []), source])], savedAt: prev.savedAt || Date.now() };
      }

      function renderMock() {
        if (!exam) {
          setHTML("mock", `<div class="page-heading"><div><p class="eyebrow">MOCK EXAM</p><h1>10분 모의고사</h1><p>제출 전까지 정답과 해설은 보이지 않아요.</p></div></div><section class="start-card"><div class="empty-icon">10</div><h2>준비되면 시작해 주세요.</h2><p>5문제를 10분 동안 풀어요. 제출 전 미응답 문항을 한 번 더 확인할 수 있어요.</p><div class="start-details"><div><strong>5문제</strong><small>객관식 단일 정답</small></div><div><strong>10분</strong><small>남은 시간 표시</small></div><div><strong>자동 채점</strong><small>제출 후 해설 제공</small></div></div><button class="button primary" data-action="start-exam">모의고사 시작</button></section>`);
          return;
        }
        const q = questions[exam.index];
        const selected = exam.answers[exam.index] ?? null;
        const mins = String(Math.floor(exam.remaining / 60)).padStart(2, "0");
        const secs = String(exam.remaining % 60).padStart(2, "0");
        setHTML("mock", `<div class="page-heading"><div><p class="eyebrow">MOCK EXAM</p><h1>모의고사 진행 중</h1></div></div><div class="exam-status"><div class="exam-status-group"><span class="timer">남은 시간 ${mins}:${secs}</span><span class="progress-text">답한 문항 ${exam.answers.filter(a => a !== null).length}/${questions.length}</span></div><button class="button danger small" data-action="finish-exam">시험 제출</button></div><div class="exam-layout">${questionCard(q, selected, false, exam.index + 1, questions.length, "exam")}<aside class="question-map"><h2>문제 이동</h2><div class="number-grid">${questions.map((_, i) => `<button class="number-button ${exam.answers[i] !== null ? "answered" : ""} ${exam.index === i ? "current" : ""}" data-exam-index="${i}">${i + 1}</button>`).join("")}</div><p class="section-note">파란색은 답한 문제예요.</p></aside></div>`);
        const submit = document.querySelector('[data-view="mock"] [data-action="submit"]');
        if (submit) { submit.textContent = exam.index === questions.length - 1 ? "제출 화면 확인" : "다음 문제"; submit.dataset.action = "exam-next"; submit.disabled = false; }
      }
      function startExam() {
        exam = { index: 0, answers: Array(questions.length).fill(null), remaining: 600 };
        clearInterval(timerId);
        timerId = setInterval(() => { if (!exam) return; exam.remaining -= 1; if (exam.remaining <= 0) finishExam(true); else { const timer = document.querySelector(".timer"); if (timer) { const m = String(Math.floor(exam.remaining / 60)).padStart(2, "0"), s = String(exam.remaining % 60).padStart(2, "0"); timer.textContent = `남은 시간 ${m}:${s}`; } } }, 1000);
        renderMock();
      }
      function finishExam(timeout = false) {
        if (!exam) return;
        const unanswered = exam.answers.filter(a => a === null).length;
        if (!timeout && !confirm(unanswered ? `아직 답하지 않은 문제가 ${unanswered}개 있어요. 그래도 제출할까요?` : "답안을 제출하고 결과를 확인할까요?")) return;
        clearInterval(timerId);
        const details = questions.map((q, i) => ({ questionId: q.id, selected: exam.answers[i], correct: exam.answers[i] === q.answer }));
        const correct = details.filter(d => d.correct).length;
        lastResult = { details, correct, score: Math.round(correct / questions.length * 100), createdAt: Date.now() };
        state.mockAttempts.push(lastResult);
        details.forEach((d, i) => { if (!d.correct) saveWrong(questions[i], "모의고사"); });
        saveState(); exam = null; navigate("result");
        if (timeout) showToast("시험 시간이 끝나 자동 제출했어요.");
      }

      function renderResult() {
        const r = lastResult || state.mockAttempts.at(-1);
        if (!r) { setHTML("result", `<section class="empty-state"><div class="empty-icon">?</div><h2>확인할 결과가 없어요.</h2><p>모의고사를 먼저 풀어 주세요.</p><button class="button primary" data-route="mock">모의고사 시작</button></section>`); return; }
        setHTML("result", `<div class="page-heading"><div><p class="eyebrow">RESULT</p><h1>결과와 해설</h1><p>점수와 문항별 정오답을 확인해 보세요.</p></div></div><section class="score-card"><div class="score-ring"><div><strong>${r.score}</strong><small>점</small></div></div><div class="score-copy"><h2>${r.score >= 80 ? "핵심 개념을 잘 이해하고 있어요!" : "틀린 개념부터 차근차근 복습해요."}</h2><p>${questions.length}문제 중 ${r.correct}문제를 맞혔어요.</p><div class="mini-stats"><span class="mini-stat">정답 ${r.correct}</span><span class="mini-stat">오답 ${questions.length - r.correct}</span><span class="mini-stat">${formatDate(r.createdAt)}</span></div><div class="button-row"><button class="button primary" data-route="wrong">오답 복습하기</button><button class="button secondary" data-route="mock">다시 응시하기</button></div></div></section><div class="result-list">${r.details.map((d, i) => { const q = questions[i]; return `<article class="result-item"><div class="result-item-head"><span class="tag">${esc(q.topic)}</span><span class="status-label ${d.correct ? "correct" : "incorrect"}">${d.correct ? "정답" : "오답"}</span></div><h3>${i + 1}. ${esc(q.stem)}</h3><div class="answer-lines"><p><strong>내 답:</strong> ${d.selected === null ? "미응답" : `${d.selected + 1}번 · ${esc(q.choices[d.selected])}`}</p><p><strong>정답:</strong> ${q.answer + 1}번 · ${esc(q.choices[q.answer])}</p></div><div class="explanation-box"><p>${esc(q.explanation)}</p></div></article>`; }).join("")}</div>`);
      }

      function renderWrong() {
        const entries = Object.entries(state.wrongNotes);
        setHTML("wrong", `<div class="page-heading"><div><p class="eyebrow">REVIEW</p><h1>오답노트</h1><p>틀린 이유를 메모하고 복습 완료 상태를 관리해요.</p></div></div>${entries.length ? `<div class="review-toolbar"><p>전체 ${entries.length}개 · 복습 필요 ${pendingWrong()}개</p><button class="button ghost small" data-action="clear-completed">완료 항목 정리</button></div><div class="wrong-list">${entries.map(([id, note]) => { const q = questions.find(q => q.id === id); if (!q) return ""; return `<article class="wrong-card ${note.completed ? "completed" : ""}" data-wrong-id="${id}"><div class="wrong-card-head"><span class="tag">${esc(q.topic)}</span><span class="status-label ${note.completed ? "correct" : "incorrect"}">${note.completed ? "복습 완료" : "복습 필요"}</span></div><h2>${esc(q.stem)}</h2><div class="explanation-box"><p><strong>정답 ${q.answer + 1}번.</strong> ${esc(q.explanation)}</p></div><label class="memo-label">나의 복습 메모<textarea class="memo" maxlength="500" placeholder="헷갈린 이유나 기억할 내용을 적어보세요.">${esc(note.memo || "")}</textarea></label><div class="wrong-actions"><button class="button secondary small" data-action="save-memo">메모 저장</button><button class="button primary small" data-action="toggle-complete">${note.completed ? "다시 복습하기" : "복습 완료"}</button></div></article>`; }).join("")}</div>` : `<section class="empty-state"><div class="empty-icon">✓</div><h2>아직 저장된 오답이 없어요.</h2><p>학습이나 모의고사에서 틀린 문제가 자동으로 모여요.</p><button class="button primary" data-route="learn">첫 문제 풀기</button></section>`}`);
      }

      document.addEventListener("click", event => {
        const route = event.target.closest("[data-route]")?.dataset.route;
        if (route) { navigate(route); return; }
        if (event.target.closest(".menu-toggle")) { const nav = document.querySelector(".site-nav"); nav.classList.toggle("open"); document.querySelector(".menu-toggle").setAttribute("aria-expanded", nav.classList.contains("open")); return; }
        const topic = event.target.closest("[data-topic]")?.dataset.topic;
        if (topic) { learn = { filter: topic, index: 0, selected: null, submitted: false }; renderLearn(); return; }
        const examIndex = event.target.closest("[data-exam-index]")?.dataset.examIndex;
        if (examIndex !== undefined) { exam.index = Number(examIndex); renderMock(); return; }
        const action = event.target.closest("[data-action]")?.dataset.action;
        if (!action) return;
        if (action === "start-exam") startExam();
        if (action === "finish-exam") finishExam();
        if (action === "prev") { if (document.querySelector('[data-view="learn"]:not([hidden])')) { learn.index -= 1; learn.selected = null; learn.submitted = false; renderLearn(); } else if (exam) { exam.index = Math.max(0, exam.index - 1); renderMock(); } }
        if (action === "submit" && !learn.submitted) { const q = filteredQuestions()[learn.index]; learn.submitted = true; const correct = learn.selected === q.answer; state.learnAttempts.push({ questionId: q.id, correct, createdAt: Date.now() }); if (!correct) saveWrong(q, "주제별 학습"); saveState(); renderLearn(); }
        if (action === "next" && learn.submitted) { const list = filteredQuestions(); if (learn.index === list.length - 1) { showToast("선택한 주제의 학습을 완료했어요!"); navigate("home"); } else { learn.index += 1; learn.selected = null; learn.submitted = false; renderLearn(); } }
        if (action === "exam-next" && exam) { if (exam.index === questions.length - 1) finishExam(); else { exam.index += 1; renderMock(); } }
        if (action === "save-memo") { const card = event.target.closest("[data-wrong-id]"); state.wrongNotes[card.dataset.wrongId].memo = card.querySelector(".memo").value; saveState(); showToast("복습 메모를 저장했어요."); }
        if (action === "toggle-complete") { const card = event.target.closest("[data-wrong-id]"); const note = state.wrongNotes[card.dataset.wrongId]; note.completed = !note.completed; saveState(); renderWrong(); showToast(note.completed ? "복습 완료로 표시했어요." : "다시 복습할 문제로 표시했어요."); }
        if (action === "clear-completed") { Object.keys(state.wrongNotes).forEach(id => { if (state.wrongNotes[id].completed) delete state.wrongNotes[id]; }); saveState(); renderWrong(); showToast("완료한 오답을 정리했어요."); }
      });

      document.addEventListener("change", event => {
        const input = event.target;
        if (!input.matches('input[type="radio"]')) return;
        const value = Number(input.value);
        if (input.name.startsWith("learn-")) { learn.selected = value; renderLearn(); }
        if (input.name.startsWith("exam-") && exam) { exam.answers[exam.index] = value; renderMock(); }
      });

      updateBadges();
      renderHome();
    })();
  </script>
</body>
</html>
